<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function LoadProduct(id) {
            fetch(`https://fakestoreapi.com/products/${id}`)
                .then(function (response) {
                    return response.json();
                })
                .then(function (product) {
                    document.getElementById("lblTitle").innerHTML = product.title;
                    document.getElementById("imgProduct").src = product.image;
                    document.getElementById("lblPrice").innerHTML = product.price.toLocaleString('en-us', { style: 'currency', currency: 'USD' });
                })
        }
        let ProductId = 1;
        function NextClick() {
            ProductId++;
            LoadProduct(ProductId);
        }

        function PreviousClick() {
            ProductId--;
            LoadProduct(ProductId);
        }

        function LoadProductAuto() {
            ProductId++;
            document.getElementById("txtRange").value = ProductId;
            fetch(`https://fakestoreapi.com/products/${ProductId}`)
                .then(function (response) {
                    return response.json();
                })
                .then(function (product) {
                    document.getElementById("lblTitle").innerHTML = product.title;
                    document.getElementById("imgProduct").src = product.image;
                    document.getElementById("lblPrice").innerHTML = product.price.toLocaleString('en-us', { style: 'currency', currency: 'USD' });

                })
        }

        var thread;

        function PlayClick() {
            thread = setInterval(LoadProductAuto, 5000);
            document.getElementById("ldlStatus").innerHTML = "[Slide Show - Running]";
        }

        function PauseClick() {
            clearInterval(thread);
            document.getElementById("ldlStatus").innerHTML = "[Slide Show - Paused]";
        }

    </script>
</head>

<body>
    <div class="container d-flex justify-content-center mt-5">
        <div class="card  mt-4" style="width: 720px;">
            <div class="card-head text-center">
                <div id="lblTitle"></div>
                <div class="fw-bold" id="ldlStatus"></div>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-1 d-flex flex-column justify-content-center align-item-center">
                        <button onclick="PreviousClick()" class="btn btn-dark  bi bi-chevron-left "></button>
                    </div>

                    <div class="col-10">
                        <img id="imgProduct" height="300">
                        <div id="lblPrice" class="position-absolute p-3 fs-5 top-0 end-0 badge rounded rounded-circle"
                            class="form-range"></div>
                        <input type="range" onchange="SliderChange()" min="1" max="20" id="txtRange" class="form-range">
                    </div>

                    <div class="col-1 d-flex flex-column justify-content-center align-item-center">
                        <button onclick="NextClick()" class="btn btn-dark  bi bi-chevron-right"></button>

                    </div>
                </div>

            </div>
            <div class="card-footer text-center">
                <button onclick="PlayClick()" class="btn btn-primary bi bi-play"></button>
                <button onclick="PauseClick()" class="btn btn-warning bi bi-pause mx-2"></button>

            </div>


        </div>

    </div>

</body>

</html>
