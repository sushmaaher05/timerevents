<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <script>

        function ButtonClick() {
            document.querySelector("button").textContent =
                (document.querySelector("button").textContent == "Start") ? "Stop" : "Start";
        }

        function SortClick() {
            var Sort = document.getElementById("Sort");
            Sort.className = (Sort.className == "bi bi-sort-alpha-down") ? "bi bi-sort-alpha-up" :
                "bi bi-sort-alpha-down";
        }

    </script>
</head>

<body>

    <button onclick="ButtonClick()"> Start</button>
    <button onclick="SortClick()" id="Sort" class="bi bi-sort-alpha-down"></button>

</body>

</html>
