<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function AmountChange() {
            document.getElementById("txtAmount").value =
                document.getElementById("rangeAmount").value;
        }
        function YearChange() {
            document.getElementById("txtYears").value =
                document.getElementById("rangeYears").value;
        }
        function RateChange() {
            document.getElementById("txtRate").value =
                document.getElementById("rangeRate").value;
        }

        function CalculateClick() {

            var P = parseInt(document.getElementById("txtAmount").value);
            var r = parseFloat(document.getElementById("txtRate").value) / 12 / 100;
            var n = parseInt(document.getElementById("txtYears").value) * 12;
            var EMI = P * r * (Math.pow((1 + r), n)) / (((Math.pow((1 + r), n)) - 1));

            document.getElementById("lblResult").innerHTML = `${EMI.toLocaleString('en-in', {
                style: 'currency',
                currency: 'INR',
                minimumFractionDigits: 0,
                maximumFractionDigits: 0

            })}for ${n}months `;

        }
    </script>
</head>

<body>
    <div class="container-fluid row bg-light">
        <div class="col-8 p-2">
            <div class="card p-4 w-100">
                <div>
                    <div class="d-flex align-item-center justify-content-between">
                        <div>
                            <span class="fs-5 fw-bold">Loan Amount</span>
                        </div>
                        <div>
                            <input type="text" id="txtAmount" class="form-control">
                        </div>
                    </div>

                    <div class="my-4">
                        <input type="range" onchange="AmountChange()" min="100000" max="1000000" value="100000"
                            class="form-range" id="rangeAmount">
                    </div>
                    <div>
                        <span>&#8377; 1,00,000/-</span>
                        <span class="float-end">&#8377; 1,00,000/-</span>
                    </div>
                </div>

                <div class="mt-3">
                    <div class="d-flex align-item-center justify-content-between">
                        <div>
                            <span class="fs-5 fw-bold">Loan Tenure </span>
                        </div>
                        <div>
                            <input type="text" id="txtYears" class="form-control">
                        </div>
                    </div>

                    <div class="my-4">
                        <input type="range" onchange="YearChange()" min="1" max="5" value="1" class="form-range"
                            id="rangeYears">
                    </div>
                    <div>
                        <span>&#8377; 1 Year</span>
                        <span class="float-end">&#8377; 5 Years</span>
                    </div>
                </div>


                <div class="mt-3">
                    <div class="d-flex align-item-center justify-content-between">
                        <div>
                            <span class="fs-5 fw-bold">Interest Rate</span>
                        </div>
                        <div>
                            <input type="text" size="4" id="txtRate" class="form-control">
                        </div>
                    </div>

                    <div class="my-4">
                        <input type="range" onchange="RateChange()" step="0.01" min="10.45" max="24.45" value="0.01"
                            class="form-range" id="rangeRate">
                    </div>
                    <div>
                        <span> 10%</span>
                        <span class="float-end">24%</span>
                    </div>
                    <div class="mt-5 text-center">
                        <button onclick="CalculateClick()" class="btn btn-primary w-25 p-2">Calculate</button>
                    </div>

                </div>


            </div>
        </div>
        <div class="col-4 p-2">
            <div class="card p-4 w-100">
                <div class="h3 text-center">Installment amount</div>
                <div id="lblResult" class="h4 mt-4 text-center"> </div>
            </div>

        </div>
</body>

</html>
