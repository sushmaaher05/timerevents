<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
      
      function Clock(){
        var now = new Date();
        var time = now.toLocaleTimeString();
        document.querySelector("h1").innerHTML = time;
      }
       
      function bodyload(){
        setInterval(Clock, 1000);
      }

    </script>
</head>
<body onload="bodyload()">
    <h1></h1>
</body>
</html>
